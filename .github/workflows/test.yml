name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:
    secrets:
      HAVE_RELEASE_APP_ID:
        required: false
      HAVE_RELEASE_APP_PRIVATE_KEY:
        required: false

permissions:
  contents: read
  packages: read

jobs:
  test:
    name: Run Tests
    runs-on: arc-happyvertical
    # Backstop so a stalled step (e.g. a hung browser download) fails fast
    # instead of sitting until the 6h default.
    timeout-minutes: 30

    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.HAVE_RELEASE_APP_ID }}
          private-key: ${{ secrets.HAVE_RELEASE_APP_PRIVATE_KEY }}
          owner: happyvertical
        continue-on-error: true

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          registry-url: 'https://npm.pkg.github.com'

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # The arc-runner image bakes Chromium at /ms-playwright for a specific
      # Playwright build, so this repo pins Playwright to that build (see
      # package.json) and the install is a no-op against the baked browser.
      # Bounded so a version drift that forces a re-download fails fast and
      # visibly rather than hanging. See happyvertical/iac#809.
      - name: Install Playwright Chromium
        timeout-minutes: 10
        run: pnpm exec playwright install chromium

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Run tests
        run: pnpm test
