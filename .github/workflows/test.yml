name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    name: Run Tests
    runs-on: arc-happyvertical
    # Backstop so a stalled step (e.g. a hung browser download) fails fast
    # instead of sitting until the 6h default.
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      # The arc-runner image bakes Chromium at /ms-playwright for a specific
      # Playwright build, so this repo pins Playwright to that build (see
      # package.json) and the install is a no-op against the baked browser.
      # Bounded so a version drift that forces a re-download fails fast and
      # visibly rather than hanging. See happyvertical/iac#809.
      - name: Install Playwright Chromium
        timeout-minutes: 10
        run: pnpm exec playwright install chromium

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Check API docs
        run: pnpm docs:api:check

      - name: Run tests with coverage
        run: pnpm test:coverage
