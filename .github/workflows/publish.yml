name: Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  test:
    name: Test
    uses: ./.github/workflows/test.yml
    secrets:
      HAVE_RELEASE_APP_ID: ${{ secrets.HAVE_RELEASE_APP_ID }}
      HAVE_RELEASE_APP_PRIVATE_KEY: ${{ secrets.HAVE_RELEASE_APP_PRIVATE_KEY }}

  release:
    name: Version and Publish
    needs: test
    runs-on: arc-happyvertical
    timeout-minutes: 20

    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.HAVE_RELEASE_APP_ID }}
          private-key: ${{ secrets.HAVE_RELEASE_APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          registry-url: 'https://npm.pkg.github.com'

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install
        env:
          NODE_AUTH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Capture current major version
        id: current-version
        run: |
          version=$(node -p "require('./package.json').version")
          echo "major=$(echo "$version" | cut -d. -f1)" >> $GITHUB_OUTPUT
          echo "Current version is $version"

      - name: Auto-generate changeset
        run: pnpm run changeset:auto

      - name: Version packages
        run: pnpm run changeset:version

      - name: Check for version changes
        id: version-check
        run: |
          if git diff --quiet package.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
          fi

      - name: Guard against automatic major releases
        if: steps.version-check.outputs.changed == 'true'
        env:
          NEW_VERSION: ${{ steps.version-check.outputs.version }}
          CURRENT_MAJOR: ${{ steps.current-version.outputs.major }}
        run: |
          new_major=$(echo "$NEW_VERSION" | cut -d. -f1)
          if [ "$new_major" -gt "$CURRENT_MAJOR" ]; then
            echo "ERROR: Major release ($CURRENT_MAJOR.x -> $NEW_VERSION) must be cut manually"
            echo "Major version bumps require manual approval and coordination."
            exit 1
          fi
          echo "Releasing $NEW_VERSION (no major boundary crossed) - safe to proceed"

      - name: Build
        if: steps.version-check.outputs.changed == 'true'
        run: pnpm build

      - name: Commit release
        if: steps.version-check.outputs.changed == 'true'
        run: |
          git add .
          git commit -m "chore(release): v${{ steps.version-check.outputs.version }} [skip ci]"

      - name: Publish to GitHub Packages
        if: steps.version-check.outputs.changed == 'true'
        run: pnpm run changeset:publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Push changes and tag
        if: steps.version-check.outputs.changed == 'true'
        run: |
          git tag "v${{ steps.version-check.outputs.version }}"
          git push origin main
          git push origin "v${{ steps.version-check.outputs.version }}"

      - name: Create GitHub Release
        if: steps.version-check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh release create "v${{ steps.version-check.outputs.version }}" \
            --title "v${{ steps.version-check.outputs.version }}" \
            --generate-notes
